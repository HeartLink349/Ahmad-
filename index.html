<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Happy Anniversary & Birthday</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#0a0f1f;
      --text:#f8fafc;
      --pink:#ff4da6;
      --violet:#8b5cf6;
      --cyan:#22d3ee;
      --shadow: 0 28px 60px rgba(0,0,0,.55);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family: "Segoe UI", system-ui, sans-serif; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,77,166,.20), transparent 60%),
        radial-gradient(800px 500px at 80% 20%, rgba(139,92,246,.18), transparent 60%),
        radial-gradient(700px 450px at 40% 85%, rgba(34,211,238,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .glow{
      position:fixed; inset:-100px; pointer-events:none; z-index:-2;
      filter: blur(60px); opacity:.55;
      background:
        radial-gradient(500px 380px at 20% 20%, rgba(255,77,166,.30), transparent 60%),
        radial-gradient(520px 400px at 85% 25%, rgba(139,92,246,.28), transparent 65%),
        radial-gradient(420px 320px at 45% 90%, rgba(34,211,238,.18), transparent 60%);
      animation: floaty 12s ease-in-out infinite alternate;
    }
    @keyframes floaty{
      0%{ transform: translate3d(-1.5%, -1%, 0) scale(1.02); }
      100%{ transform: translate3d(1.8%, 1.2%, 0) scale(1.05); }
    }
    canvas#hearts{ position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.9; }

    .app{ height:100dvh; display:flex; flex-direction:column; }
    header{ height:86px; display:flex; align-items:center; justify-content:center; padding: 14px 18px; }
    .brand{ display:flex; align-items:center; flex-direction: column; gap:4px; min-width:0; text-align: center; }
    .logo{
      width:42px; height:42px; border-radius:14px; display:grid; place-items:center;
      background: linear-gradient(135deg, rgba(255,77,166,.22), rgba(139,92,246,.18));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
      margin-bottom: 4px;
    }
    .logo i{
      font-size:18px;
      background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .brand h1{ margin:0; font-size:15px; font-weight:900; white-space:nowrap; }
    .brand small{ display:block; font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color: rgba(255,255,255,.55); }

    main{ flex:1; padding: 0 16px 18px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .stage{ width:100%; max-width:520px; height: calc(100dvh - 86px - 18px); position:relative; margin: 0 auto; }

    .card{
      width:100%; height:100%;
      border-radius: 30px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      overflow:hidden;
      position:absolute; inset:0;
      transform: translateY(14px) scale(.985);
      opacity:0; pointer-events:none;
      transition: .55s cubic-bezier(.2,.8,.2,1);
    }
    .card.active{ transform: translateY(0) scale(1); opacity:1; pointer-events:auto; }
    .card-inner{ height:100%; overflow-y:auto; overflow-x:hidden; padding: 22px 18px 18px; scrollbar-width:none; display: flex; flex-direction: column; align-items: center; }
    .card-inner::-webkit-scrollbar{ display:none; }

    .hero{ text-align:center; padding: 18px 14px 8px; width: 100%; }
    .hero h2{ margin:0; font-size:28px; font-weight:1000; line-height:1.2; }
    .gradtxt{
      background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }
    .hero p{ margin:10px 0 0; font-size:14px; color: rgba(255,255,255,.78); font-weight:800; }

    .login-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
        width: 100%;
    }

    .panel{
      padding: 16px; border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,14,30,.45);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    .field{ display:flex; flex-direction: column; gap:15px; align-items:center; }
    .input{
      width: 100%; display:flex; align-items:center; gap:10px; padding: 14px 14px;
      border-radius: 18px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .input i{ color: rgba(255,255,255,.65); }
    input[type="password"]{
      width:100%; border:none; outline:none; background:transparent; color: var(--text);
      font-size:14px; font-weight:800; letter-spacing:.6px; text-align: center;
    }
    input::placeholder{ color: rgba(255,255,255,.55); font-weight:800; }

    .btn{
      border:none; cursor:pointer; padding: 16px 14px; border-radius: 18px; font-weight:1000;
      color:#0b1020; background: linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow: 0 14px 28px rgba(255,77,166,0.22);
      transition: transform .12s ease;
      display:flex; align-items:center; justify-content:center; gap:10px;
      width: 100%; white-space:nowrap; font-size: 16px;
    }
    .btn:active{ transform: scale(.98); }
    .btn.secondary{
      background: rgba(255,255,255,.10);
      color: var(--text);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:none;
      min-width: unset;
      width: auto;
    }
    .hint{ margin-top: 10px; font-size: 12px; color: rgba(255,255,255,.60); font-weight:700; text-align:center; }

    .section-title{ text-align:center; margin: 4px 0 12px; font-size: 18px; font-weight:1000; width: 100%; }
    .timer{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; width: 100%; }
    .tbox{
      padding: 14px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06); text-align:center; position:relative; overflow:hidden;
    }
    .tbox::before{
      content:""; position:absolute; inset:-40px;
      background: radial-gradient(circle at 20% 20%, rgba(255,77,166,.18), transparent 55%),
                radial-gradient(circle at 80% 80%, rgba(139,92,246,.16), transparent 55%);
      filter: blur(18px); opacity:.9;
    }
    .tbox > *{ position:relative; z-index:1; }
    .tval{ font-size: 22px; font-weight:1000; }
    .tlabel{ margin-top: 4px; font-size: 11px; color: rgba(255,255,255,.70); font-weight:900; letter-spacing:1px; text-transform:uppercase; }

    .player{
      margin-top: 14px; padding: 14px; border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,14,30,.45);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 40px rgba(0,0,0,.30);
      width: 100%;
    }
    .player-top{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .track{ display:flex; align-items:center; gap:10px; min-width:0; }
    .disc{
      width:42px; height:42px; border-radius:16px;
      background: linear-gradient(135deg, rgba(255,77,166,.22), rgba(139,92,246,.18));
      border: 1px solid rgba(255,255,255,.12);
      display:grid; place-items:center;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    .disc i{ font-size:16px; background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .track-title{ font-weight:1000; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track-sub{ font-size:11px; color: var(--pink); font-weight:800; margin-top:2px; }

    .pbtn{
      width:48px; height:48px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor:pointer;
      display:grid; place-items:center;
      transition: transform .12s ease;
    }
    .pbtn:active{ transform: scale(.98); }
    .bar{ margin-top: 12px; display:flex; align-items:center; gap:10px; }
    .time{ font-size: 11px; color: rgba(255,255,255,.65); font-weight:900; min-width:42px; text-align:center; }
    .range{ flex:1; height: 10px; border-radius: 999px; background: rgba(255,255,255,.10); position:relative; cursor:pointer; overflow:hidden; }
    .fill{ position:absolute; inset:0 auto 0 0; width:0%; background: linear-gradient(135deg, var(--pink), var(--violet)); border-radius: 999px; }
    .knob{
      position:absolute; top:50%; width: 16px; height:16px; border-radius: 50%;
      background:#fff; transform: translate(-50%, -50%); left: 0%;
      box-shadow: 0 10px 24px rgba(0,0,0,.30);
      border: 3px solid rgba(255,77,166,.35);
      pointer-events:none;
    }
    .player-bottom{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top: 12px; }
    .vwrap{ display:flex; align-items:center; gap:8px; width:45%; }
    .vwrap i{ color: rgba(255,255,255,.7); }
    input[type="range"].vol{ width:100%; accent-color: var(--pink); }

    .headline{ margin: 14px 0 8px; text-align:center; font-size: 18px; font-weight:1000; width: 100%; }

    .grid{ 
      display:flex; 
      flex-direction: column; 
      gap: 20px; 
      margin-top: 12px; 
      width: 100%; 
      align-items: center; 
    }
    .imgcard{
      border-radius: 20px; 
      overflow:hidden; 
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06); 
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      display:flex; 
      flex-direction:column; 
      width: 100%; 
      max-width: 340px; 
      touch-action: pan-y;
    }
    .imgwrap{ position:relative; overflow:hidden; width: 100%; }
    .imgwrap img{ width:100%; height:auto; display:block; transition: transform .7s cubic-bezier(.2,.8,.2,1); object-fit: cover; }
    .imgcard:active img{ transform: scale(1.05); }
    .cap{ padding: 12px 10px 15px; font-size: 14px; font-weight:900; color: rgba(255,255,255,.86); text-align:center; }
    .cap .tiny{ display:block; margin-top:2px; font-size: 11px; font-weight:800; color: rgba(255,255,255,.58); }

    .cta{ margin-top: 14px; display:flex; justify-content:center; width: 100%; }
    .cta .btn{ width:100%; max-width: 360px; min-width: unset; white-space: normal; height: auto; padding: 20px; }

    .overlay{
      position:fixed; inset:0;
      background: radial-gradient(800px 500px at 50% 30%, rgba(255,77,166,.16), transparent 55%),
                radial-gradient(800px 520px at 50% 75%, rgba(139,92,246,.16), transparent 60%),
                rgba(0,0,0,.65);
      backdrop-filter: blur(10px);
      display:flex; align-items:center; justify-content:center;
      padding: 18px;
      opacity:0; pointer-events:none;
      transition: opacity .35s ease;
      z-index: 50;
    }
    .overlay.show{ opacity:1; pointer-events:auto; }
    .letter{
      width:min(560px, 100%);
      border-radius: 28px; border: 1px solid rgba(255,77,166,.3);
      background: rgba(10,14,30,0.9);
      box-shadow: 0 30px 80px rgba(0,0,0,.65);
      overflow-y:auto;
      max-height: 85vh;
      transform: translateY(10px) scale(.99);
      transition: transform .35s ease;
    }
    .overlay.show .letter{ transform: translateY(0) scale(1); }
    .letter-head{
      padding: 16px 16px 12px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom: 1px solid rgba(255,255,255,.10);
      position: sticky; top:0; background: rgba(10,14,30,1); z-index: 10;
    }
    .letter-head .ttl{ font-weight:1000; color: var(--pink); }
    .xbtn{
      width:40px; height:40px; border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor:pointer;
      display:grid; place-items:center;
    }
    .letter-body{ padding: 20px; font-size: 16px; font-weight: 700; line-height: 1.8; text-align:center; color: #eee; }

    .toast{
      position:fixed; left: 50%; bottom: 16px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 14px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(10,14,30,.70);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 50px rgba(0,0,0,.55);
      font-weight: 900;
      font-size: 12px;
      color: rgba(255,255,255,.9);
      opacity:0; pointer-events:none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 60;
    }
    .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
    .toast .warn{
      background: linear-gradient(135deg, #fbbf24, #fb7185);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    @media (max-width: 360px){
      .hero h2{ font-size: 26px; }
      .tval{ font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <canvas id="hearts"></canvas>

  <div class="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"><i class="fa-solid fa-heart"></i></div>
        <div style="min-width:0">
          <h1>HAPPY ANNIVERSARY & BIRTHDAY</h1>
          <small>private love page</small>
        </div>
      </div>
    </header>

    <main>
      <div class="stage">

        <section class="card active" id="page1" aria-label="Password Gate">

              <p>جاهز يا روحي؟</p>
            </div>

            <div class="login-container">
              <div class="panel">
                <div class="field">
                  <div class="input">
                    <i class="fa-solid fa-lock"></i>
                    <input id="pass" type="password" placeholder="اكتب الباسورد يا قلبي" />
                  </div>
                  <button class="btn" id="enterBtn">
                    جاهز يا حمودي
                    <i class="fa-solid fa-arrow-left"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="card" id="page2" aria-label="Valentine Page">
          <div class="card-inner">
            <div class="section-title">
              <span class="gradtxt">أحلي وألطف وأرق راجل في العالم.💙💙💙💙💙💙💙💙💙🫶🏻</span>
            </div>

              <div class="tbox"><div class="tval" id="mi">0</div><div class="tlabel">دقايق</div></div>
              <div class="tbox"><div class="tval" id="ss">0</div><div class="tlabel">ثواني</div></div>
            </div>

            <div class="player" aria-label="Music Player">
              <div class="player-top">
                <div class="track">
                  <div class="disc"><i class="fa-solid fa-music"></i></div>
                  <div style="min-width:0">
                    <div class="track-title">أغنيتنا المفضلة 🎵</div>

                <button class="pbtn" id="playBtn" aria-label="Play/Pause">

              </div>

              <div class="bar">

              </div>

              <audio id="audio" loop preload="auto" src="https://d.top4top.io/m_3684yk6c61.mp3"></audio>
            </div>

            <div class="grid" aria-label="Gallery">
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://h.top4top.io/p_3684f67061.jpg"></div>
                <figcaption class="cap">حتي قبل ان التقيك لم نكن اغرابا</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://b.top4top.io/p_3684nekem1.jpg"></div>
                <figcaption class="cap">انا وانت واتنين شاي بالنعناع وام كلثوم</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://f.top4top.io/p_36840905t1.jpg"></div>
                <figcaption class="cap">حققتلي حلم طفولتي معاك💖</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://j.top4top.io/p_3684omn7p1.jpg"></div>
                <figcaption class="cap">ويكفيني م هذا العمر اني حظيت بك</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://i.top4top.io/p_3684fj2891.jpg"></div>
                <figcaption class="cap">حبيب عنيا</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://i.top4top.io/p_3684dc7so1.jpg"></div>
                <figcaption class="cap">احلي سينما ديت مع الراجل الصح🤍🫀</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://a.top4top.io/p_3684s3l4t1.jpg"></div>
                <figcaption class="cap">كنت برسمك بعيوني مش بإيدي</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://l.top4top.io/p_36842f7us1.jpg"></div>
                <figcaption class="cap">بيص ع ايدي لقيتها ماسكه ف ايد احسن واحن راجل ف الدنيا</figcaption>
              </figure>
              <figure class="imgcard">
                <div class="imgwrap"><img src="https://k.top4top.io/p_3684n78aj1.jpg"></div>
                <figcaption class="cap">Happy anniversary my favorite person🫀</figcaption>
              </figure>
            </div>

            <div class="cta">
              <button class="btn" id="msgBtn">
                Happy 1st anniversary with my man💙🌎
              </button>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="letter">
      <div class="letter-head">
        <div class="ttl">رسالة ليك 💌</div>
        <button class="xbtn" id="closeOverlay" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="letter-body" id="letterBody">
        </div>
    </div>
  </div>

  <div class="toast" id="toast"><span class="warn">😅</span> الباسورد غلط يا روحي</div>

    document.getElementById("letterBody").innerText = msgContent;

    const page1 = document.getElementById("page1");
    const page2 = document.getElementById("page2");
    const pass = document.getElementById("pass");
    const enterBtn = document.getElementById("enterBtn");
    const toast = document.getElementById("toast");
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");

    enterBtn.addEventListener("click", ()=>{
      if((pass.value || "").trim() === PASSWORD){
        page1.classList.remove("active");
        page2.classList.add("active");
        audio.play().catch(()=>{});
      }else{
        toast.classList.add("show");
        setTimeout(()=>toast.classList.remove("show"), 1700);
      }
    });

    const elYY = document.getElementById("yy"), elMM = document.getElementById("mm"), elDD = document.getElementById("dd");
    const elHH = document.getElementById("hh"), elMI = document.getElementById("mi"), elSS = document.getElementById("ss");

    function tick(){
      const now = new Date();
      let years = now.getFullYear() - STORY_START.getFullYear();
      let months = now.getMonth() - STORY_START.getMonth();
      let days = now.getDate() - STORY_START.getDate();
      if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
      if (months < 0) { years--; months += 12; }
      const diff = now - STORY_START;
      elYY.textContent = years; elMM.textContent = months; elDD.textContent = days;
      elHH.textContent = String(Math.floor((diff/3600000)%24)).padStart(2,'0');
      elMI.textContent = String(Math.floor((diff/60000)%60)).padStart(2,'0');
      elSS.textContent = String(Math.floor((diff/1000)%60)).padStart(2,'0');
    }
    setInterval(tick, 1000); tick();

    playBtn.addEventListener("click", ()=>{
      if(audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; }
      else { audio.pause(); playBtn.innerHTML = '<i class="fa-solid fa-play"></i>'; }
    });
    audio.addEventListener("timeupdate", ()=>{
      const p = (audio.currentTime / audio.duration) * 100;
      document.getElementById("fill").style.width = p + "%";
      document.getElementById("knob").style.left = p + "%";
      document.getElementById("cur").textContent = Math.floor(audio.currentTime/60) + ":" + String(Math.floor(audio.currentTime%60)).padStart(2,'0');
    });
    audio.addEventListener("loadedmetadata", ()=>{
        document.getElementById("dur").textContent = Math.floor(audio.duration/60) + ":" + String(Math.floor(audio.duration%60)).padStart(2,'0');
    });

    const overlay = document.getElementById("overlay");
    document.getElementById("msgBtn").onclick = () => overlay.classList.add("show");
    document.getElementById("closeOverlay").onclick = () => overlay.classList.remove("show");

    // Falling hearts (Modified to draw heart shapes)
    const canvas = document.getElementById("hearts");
    const ctx = canvas.getContext("2d");
    let W, H;
    const hearts = [];
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for(let i=0; i<40; i++) hearts.push({x:Math.random()*W, y:Math.random()*H, s:Math.random()*15+10, v:Math.random()*1+0.5});
    
    function drawHeart(x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y + size / 4);
        ctx.quadraticCurveTo(x, y, x + size / 4, y);
        ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
        ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
        ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
        ctx.quadraticCurveTo(x + size, y + size / 2, x + size / 2, y + size * 0.9);
        ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
        ctx.fill();
    }

    function draw(){
      ctx.clearRect(0,0,W,H); 
      ctx.fillStyle = "rgba(255,77,166,0.5)";
      hearts.forEach(h => {
        drawHeart(h.x, h.y, h.s);
        h.y += h.v; 
        if(h.y > H) h.y = -20;
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
